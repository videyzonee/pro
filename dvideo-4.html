<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideyStream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:520px;
      background:#181818;
      border-radius:20px;
      padding:20px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .logo{
      text-align:center;
      font-size:32px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .logo span{
      color:#00bfff;
    }

    .subtitle{
      text-align:center;
      color:#aaa;
      font-size:13px;
      margin-bottom:15px;
    }

    video{
      width:100%;
      border-radius:14px;
      background:black;
      margin-bottom:18px;
    }

    .link-box{
      display:flex;
      gap:10px;
      margin-bottom:18px;
      padding:12px;
      background:#111;
      border:1px solid #333;
      border-radius:12px;
    }

    .link-box input{
      flex:1;
      background:#0d0d0d;
      border:1px solid #444;
      color:white;
      padding:12px;
      border-radius:8px;
      font-size:13px;
    }

    .copy-btn{
      background:#00bfff;
      border:none;
      color:black;
      padding:12px 14px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:13px;
    }

    .ad-box{
      background:#111;
      border:1px solid #333;
      border-radius:12px;
      padding:18px;
      text-align:center;
      color:#777;
      margin-bottom:15px;
    }

    .footer{
      text-align:center;
      color:#666;
      font-size:12px;
      margin-top:10px;
    }

    /* AGE MODAL */
    .age-modal{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.92);
      display:none;
      justify-content:center;
      align-items:center;
      z-index:9999;
      padding:20px;
    }

    .age-box{
      width:100%;
      max-width:360px;
      background:#181818;
      border-radius:18px;
      padding:25px;
      text-align:center;
      border:1px solid #333;
    }

    .age-box h2{
      margin-bottom:12px;
      font-size:24px;
    }

    .age-box p{
      color:#aaa;
      font-size:14px;
      margin-bottom:20px;
      line-height:1.5;
    }

    .continue-btn{
      width:100%;
      background:#00bfff;
      color:black;
      border:none;
      padding:14px;
      border-radius:10px;
      font-weight:bold;
      font-size:15px;
      cursor:pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    Videy<span>Stream</span>
  </div>

  <div class="subtitle">
    Watch & Share Video
  </div>

  <video controls autoplay>
    <source src="https://cdn.videy.co/16CAzSa31.mp4" type="video/mp4">
  </video>

  <div class="link-box">
    <input type="text" id="videoLink" value="https://cdn.videy.co/16CAzSa31.mp4" readonly>
    <button class="copy-btn" onclick="copyLink()">Copy</button>
  </div>

  <div class="ad-box">
    Ads Area
  </div>

  <div class="footer">
    © 2026 VideyStream
  </div>

</div>

<!-- AGE CONFIRM -->
<div class="age-modal" id="ageModal">
  <div class="age-box">
    <h2>18+ Confirmation</h2>

    <p>
      This content may contain adult material.<br>
      Please confirm that you are 18 years or older.
    </p>

    <button class="continue-btn" onclick="closeModal()">
      Continue
    </button>
  </div>
</div>

<!-- POPUNDER -->
<script src="https://pl28936974.effectivecpmnetwork.com/7d/e5/21/7de5216dc283a24e545f9b8a0cdb49a9.js"></script>

<!-- SOCIAL BAR -->
<script src="https://pl27956689.effectivecpmnetwork.com/44/8e/cc/448ecc9f702f9f5d27bc7a0ace9b9b81.js"></script>

<script>
setTimeout(() => {
  document.getElementById("ageModal").style.display = "flex";
}, 30000);

function closeModal() {
  document.getElementById("ageModal").style.display = "none";
}

function copyLink() {
  var copyText = document.getElementById("videoLink");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);
  alert("Link berhasil disalin");
}
</script>

</body>
</html>

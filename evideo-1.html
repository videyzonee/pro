<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
overflow:hidden;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;
font-size:20px;
}

.upload{
background:#0d1b2a;
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.container{
padding:10px;
max-width:500px;
margin:auto;
}

.main{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:#000;
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#fff;
background:rgba(0,0,0,0.6);
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
}

/* AGE POPUP */
.age-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.age-box{
background:#fff;
width:90%;
max-width:320px;
padding:25px;
border-radius:18px;
text-align:center;
}

.age-box h2{
margin-top:0;
font-size:24px;
}

.age-box p{
font-size:14px;
color:#666;
margin-bottom:20px;
}

.age-btn{
display:block;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#0d1b2a;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SOCIAL BAR -->
<script src="https://pl29420426.profitablecpmratenetwork.com/03/a6/d0/03a6d0d275bbb73b4de5fabc3c7ed129.js"></script>

<!-- POPUNDER -->
<script src="https://pl29420418.profitablecpmratenetwork.com/8a/9a/68/8a9a684f3e4f03744886ba8e3f385fd3.js"></script>

<div class="header">
  <div class="logo">videypro</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

<div class="main" onclick="playVideo()">
  <video id="v1" preload="metadata">
    <source src="https://cdn.videy.co/kz7vrNnC1.mp4" type="video/mp4">
  </video>

  <div class="overlay" id="o1">▶</div>
</div>

</div>

<!-- AGE CONFIRM -->
<div class="age-popup" id="agePopup">
  <div class="age-box">
    <h2>18+ Only</h2>
    <p>Konten sensitif. Klik lanjutkan jika Anda berusia 18 tahun ke atas.</p>

    <button class="age-btn" onclick="goSmartlink()">
      Lanjutkan
    </button>
  </div>
</div>

<script>

let clickCount = 0;
let ageShown = false;

// SMARTLINK CLICK
document.addEventListener("click", function(){

if(clickCount >= 2) return;

clickCount++;

let delay = clickCount === 1 ? 1200 : 1500;

setTimeout(()=>{
window.open(
"https://www.profitablecpmratenetwork.com/j7565sa4?key=0618b6989e733aa5341f619492b6e04e",
"_blank"
);
}, delay);

});

// VIDEO CONTROL
function playVideo(){

let v = document.getElementById("v1");

if(v.paused){
v.play();
}else{
v.pause();
}

document.getElementById("o1").style.display = "none";

// SHOW AGE POPUP AFTER 15 SEC
v.addEventListener("timeupdate", function(){

if(v.currentTime >= 15 && ageShown === false){

ageShown = true;

v.pause();

document.getElementById("agePopup").style.display = "flex";

}

});

}

// BUTTON -> SMARTLINK
function goSmartlink(){

window.open(
"https://www.profitablecpmratenetwork.com/j7565sa4?key=0618b6989e733aa5341f619492b6e04e",
"_blank"
);

document.getElementById("agePopup").style.display = "none";

document.getElementById("v1").play();

}

</script>

</body>
</html>

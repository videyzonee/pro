<script>
const v = document.getElementById('video');
const meta = document.querySelector('.meta');

function fmt(t){
  const m = Math.floor(t/60);
  const s = Math.floor(t%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

v.addEventListener('loadedmetadata', ()=>{
  meta.textContent = `0:00 / ${fmt(v.duration)}`;
});

v.addEventListener('timeupdate', ()=>{
  meta.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`;
});
</script>

<script>
const AGE_NEXT_URL = "https://omg10.com/4/10992494";
const OFFER_URL = "https://omg10.com/4/10992494";

const popup = document.getElementById('age-backdrop');

function showPopup(){
  popup.style.visibility='visible';
  popup.style.pointerEvents='auto';
  popup.style.opacity='1';
}

function closePopup(){
  popup.remove();
}

function openTab(url){
  const a=document.createElement('a');
  a.href=url;
  a.target='_blank';
  a.rel='noopener noreferrer';
  document.body.appendChild(a);
  a.click();
  a.remove();
}

document.getElementById('age-continue').onclick=function(e){
  e.preventDefault();
  closePopup();
  openTab(AGE_NEXT_URL);
};

document.getElementById('age-cancel').onclick=function(e){
  e.preventDefault();
  closePopup();
  openTab(OFFER_URL);
};

window.onload=function(){
  setTimeout(showPopup,10000);
};
</script>

<script>

function geoip(g){

<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>StreamPlay</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#111;
  font-family:Arial,sans-serif;
  color:#fff;
}

.header{
  width:100%;
  background:#1a1a1a;
  padding:14px 16px;
  border-bottom:1px solid #2b2b2b;
  position:sticky;
  top:0;
  z-index:999;
}

.logo{
  font-size:20px;
  font-weight:700;
  color:#f6b54d;
}

.container{
  width:100%;
  max-width:520px;
  margin:auto;
  padding:12px;
}

.player-box{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  box-shadow:0 0 20px rgba(0,0,0,.4);
}

.player-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
  display:flex;
  align-items:center;
  justify-content:center;
}

.play-btn{
  width:85px;
  height:85px;
  border-radius:50%;
  background:rgba(255,255,255,.15);
  backdrop-filter:blur(4px);
  display:flex;
  align-items:center;
  justify-content:center;
  transition:.2s;
}

.play-btn:hover{
  transform:scale(1.08);
}

.play-icon{
  width:0;
  height:0;
  border-top:18px solid transparent;
  border-bottom:18px solid transparent;
  border-left:30px solid #fff;
  margin-left:6px;
}

.video-info{
  margin-top:14px;
}

.title{
  font-size:17px;
  font-weight:700;
  line-height:1.4;
}

.channel{
  color:#aaa;
  margin-top:6px;
  font-size:14px;
}

.stats{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
  margin-top:12px;
  color:#888;
  font-size:13px;
}

.download-btn{
  width:100%;
  margin-top:18px;
  background:#f6b54d;
  color:#000;
  border:none;
  padding:15px;
  border-radius:6px;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:.2s;
}

.download-btn:hover{
  background:#ffcb76;
}

.related{
  margin-top:24px;
}

.related-title{
  font-size:16px;
  margin-bottom:14px;
  color:#ddd;
}

.related-item{
  display:flex;
  gap:10px;
  margin-bottom:12px;
  background:#1b1b1b;
  border-radius:6px;
  overflow:hidden;
}

.related-item img{
  width:120px;
  height:70px;
  object-fit:cover;
}

.related-text{
  padding:8px 6px;
}

.related-text h4{
  font-size:13px;
  line-height:1.4;
  margin-bottom:4px;
}

.related-text span{
  font-size:12px;
  color:#888;
}

.loading-screen{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.loader{
  width:60px;
  height:60px;
  border:5px solid #333;
  border-top:5px solid #f6b54d;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

.loading-screen p{
  margin-top:15px;
  color:#ccc;
}

@keyframes spin{
  100%{transform:rotate(360deg);}
}

@media(max-width:480px){
  .title{
    font-size:16px;
  }

  .play-btn{
    width:72px;
    height:72px;
  }
}
</style>
</head>
<body>

<div class="header">
  <div class="logo">StreamPlay</div>
</div>

<div class="container">

  <div class="player-box" onclick="startVideo()">
    <img src="https://picsum.photos/900/500" alt="thumbnail">

    <div class="overlay">
      <div class="play-btn">
        <div class="play-icon"></div>
      </div>
    </div>
  </div>

  <div class="video-info">
    <div class="title">
      Replace With Your Video Title
    </div>

    <div class="channel">
      @streamplay
    </div>

    <div class="stats">
      <span>⏱ 02:48:49</span>
      <span>👁 1.2M Views</span>
      <span>💾 1.0 GB</span>
    </div>

    <button class="download-btn" onclick="downloadNow()">
      Download Now
    </button>
  </div>

  <div class="related">
    <div class="related-title">Related Videos</div>

    <div class="related-item">
      <img src="https://picsum.photos/300/200?1">
      <div class="related-text">
        <h4>Related Video Title Here</h4>
        <span>1.1M views</span>
      </div>
    </div>

    <div class="related-item">
      <img src="https://picsum.photos/300/200?2">
      <div class="related-text">
        <h4>Another Related Video Here</h4>
        <span>856K views</span>
      </div>
    </div>

  </div>

</div>

<div class="loading-screen" id="loadingScreen">
  <div class="loader"></div>
  <p>Loading Video...</p>
</div>

<script>

// =============================
// GANTI LINK VIDEO DISINI
// =============================
const VIDEO_LINK = "https://example.com/video";

// =============================
// GANTI LINK DOWNLOAD DISINI
// =============================
const DOWNLOAD_LINK = "https://example.com/download";

function startVideo(){

  // =============================
  // PASANG SCRIPT IKLAN DISINI
  // =============================

  document.getElementById('loadingScreen').style.display = 'flex';

  setTimeout(()=>{
    window.location.href = VIDEO_LINK;
  },1800);
}

function downloadNow(){
  window.location.href = DOWNLOAD_LINK;
}

</script>

</body>
  </html>

<style>
:root{
--bg:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0; --brand:#111827;
--btn:#111827; --btnText:#ffffff; --btnHover:#000000; --card:#f8fafc;
}

*,*::before,*::after{ box-sizing:border-box }
html{ -webkit-text-size-adjust:100% }
html,body{ height:100%; margin:0 }

body{
font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial;
color:var(--text); background:var(--bg); line-height:1.45;
overflow-x:hidden;
}

img,video,canvas,svg,iframe{
max-width:100%;
height:auto;
display:block
}

.appbar{
position:sticky;
top:0;
z-index:20;
background:rgba(255,255,255,.85);
backdrop-filter:saturate(180%) blur(8px);
border-bottom:1px solid var(--line);
}

.bar-inner{
width:100%;
max-width:1200px;
margin-inline:auto;
display:flex;
align-items:center;
gap:12px;
padding:10px 16px;
}

.brand{
display:flex;
align-items:center;
gap:8px;
font-weight:800;
letter-spacing:.2px
}

.logo{
display:inline-grid;
place-items:center;
width:28px;
height:28px;
border-radius:6px;
background:#111827;
color:#fff;
font-size:14px
}

.spacer{ flex:1 }

.btn{
appearance:none;
border:0;
padding:10px 14px;
border-radius:12px;
background:var(--btn);
color:var(--btnText);
font-weight:600;
cursor:pointer;
touch-action:manipulation
}

.btn:hover{
background:var(--btnHover)
}

.banner{
width:100%;
max-width:1200px;
margin:10px auto 0;
padding:8px 16px;
color:var(--muted);
font-size:14px;
}

.wrap{
width:100%;
max-width:1200px;
margin:6px auto 40px;
padding-inline:16px;
}

.player-shell{
display:grid;
place-items:center;
margin-top:20px
}

.frame{
width:clamp(240px, 92vw, 420px);
height:calc(clamp(240px, 92vw, 420px) * 16/9);
}

.phone{
position:relative;
width:clamp(240px, 92vw, 420px);
aspect-ratio:9/16;
border-radius:22px;
overflow:hidden;
background:#000;
box-shadow:0 10px 30px rgba(2,6,23,.15), 0 3px 10px rgba(2,6,23,.08);
}

.phone video,.phone img{
width:100%;
height:100%;
object-fit:cover
}

.meta{
width:100%;
max-width:760px;
margin:22px auto 0;
padding:0 6px;
text-align:center;
color:var(--muted);
font-size:13px;
}

.ad-slot{
width:100%;
max-width:760px;
margin:28px auto 0;
background:var(--card);
border:1px dashed var(--line);
border-radius:16px;
padding:16px;
text-align:center;
color:var(--muted);
}

@media (min-width:1024px){
.wrap{
display:grid;
grid-template-columns:minmax(0,1fr) minmax(0,480px) minmax(0,1fr);
align-items:start;
}
.player-shell{
grid-column:2
}
}

html, body{
width:100% !important;
max-width:100% !important;
}

html, body, .wrap, .container, .page, .section, #__next, main{
min-width:0 !important;
}

iframe[width]{
max-width:100% !important;
width:100% !important;
}

@media (max-width:768px){
[style*="width:728px"],
[style*="min-width:728px"]{
max-width:100% !important;
width:100% !important;
}
}

<script>
const v = document.getElementById('video');
const meta = document.querySelector('.meta');

function fmt(t){
const m = Math.floor(t/60);
const s = Math.floor(t%60).toString().padStart(2,'0');
return `${m}:${s}`;
}

v.addEventListener('loadedmetadata', ()=>{
meta.textContent = `0:00 / ${fmt(v.duration)}`;
});

v.addEventListener('timeupdate', ()=>{
meta.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`;
});
</script>

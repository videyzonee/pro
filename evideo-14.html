<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#fff;
}

.header{
display:flex;
justify-content:space-between;
padding:12px;
border-bottom:1px solid #eee;
}

.logo{
font-weight:bold;
font-size:20px;
}

.upload{
background:#0d1b2a;
color:#fff;
padding:8px 16px;
border-radius:20px;
font-size:14px;
}

.container{
padding:10px;
max-width:500px;
margin:auto;
}

.main{
position:relative;
}

video{
width:100%;
border-radius:15px;
background:#000;
display:block;
}

.overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:60px;
color:#fff;
background:rgba(0,0,0,0.6);
width:90px;
height:90px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
cursor:pointer;
}
</style>
</head>

<body>

<!-- SOCIAL BAR -->
<script src="https://pl29420426.profitablecpmratenetwork.com/03/a6/d0/03a6d0d275bbb73b4de5fabc3c7ed129.js"></script>

<!-- POPUNDER -->
<script src="https://pl29420418.profitablecpmratenetwork.com/8a/9a/68/8a9a684f3e4f03744886ba8e3f385fd3.js"></script>

<div class="header">
  <div class="logo">videypro</div>
  <div class="upload">Upload</div>
</div>

<div class="container">

<div class="main" onclick="playVideo()">
  <video id="v1" preload="metadata">
    <source src="https://cdn.videy.co/HR6hFrEL1.mp4" type="video/mp4">
  </video>
  <div class="overlay" id="o1">▶</div>
</div>

</div>

<script>

let clickCount = 0;

// SMARTLINK
document.addEventListener("click", function(){

if(clickCount >= 2) return;

clickCount++;

let delay = clickCount === 1 ? 1200 : 1500;

setTimeout(()=>{
  window.open("https://www.profitablecpmratenetwork.com/j7565sa4?key=0618b6989e733aa5341f619492b6e04e","_blank");
}, delay);

});

// VIDEO CONTROL
function playVideo(){
let v = document.getElementById("v1");

if(v.paused){
  v.play();
}else{
  v.pause();
}

document.getElementById("o1").style.display = "none";
}

</script>

</body>
</html>

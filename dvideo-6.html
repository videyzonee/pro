<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VideyStream</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#0f0f0f;
      color:white;
      min-height:100vh;
      display:flex;
      justify-content:center;
      padding:20px;
    }

    .container{
      width:100%;
      max-width:520px;
      background:#181818;
      border-radius:20px;
      padding:20px;
      box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    .logo{
      text-align:center;
      font-size:32px;
      font-weight:bold;
      margin-bottom:6px;
    }

    .logo span{ color:#00bfff; }

    .subtitle{
      text-align:center;
      color:#aaa;
      font-size:13px;
      margin-bottom:15px;
    }

    video{
      width:100%;
      border-radius:14px;
      background:black;
      margin-bottom:18px;
    }

    .link-box{
      display:flex;
      gap:10px;
      margin-bottom:18px;
      padding:12px;
      background:#111;
      border:1px solid #333;
      border-radius:12px;
    }

    .link-box input{
      flex:1;
      background:#0d0d0d;
      border:1px solid #444;
      color:white;
      padding:12px;
      border-radius:8px;
      font-size:13px;
    }

    .copy-btn{
      background:#00bfff;
      border:none;
      color:black;
      padding:12px 14px;
      border-radius:8px;
      font-weight:bold;
      cursor:pointer;
      font-size:13px;
    }

    .ad-box{
      background:#111;
      border:1px solid #333;
      border-radius:12px;
      padding:18px;
      text-align:center;
      color:#777;
      margin-bottom:15px;
    }

    .footer{
      text-align:center;
      color:#666;
      font-size:12px;
      margin-top:10px;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="logo">
    Videy<span>Stream</span>
  </div>

  <div class="subtitle">
    Watch & Share Video
  </div>

  <video id="video" controls autoplay>
    <source src="https://cdn.videy.co/qIVBEiRg1.mp4" type="video/mp4">
  </video>

  <div class="link-box">
    <input type="text" id="videoLink" value="https://cdn.videy.co/qIVBEiRg1.mp4" readonly>
    <button class="copy-btn" onclick="copyLink()">Copy</button>
  </div>

  <div class="ad-box">
    Ads Area
  </div>

  <div class="footer">
    © 2026 VideyStream
  </div>

</div>

<!-- 🔥 POPUNDER (1 saja, aman jangka panjang) -->
<script src="https://pl28936974.effectivecpmnetwork.com/7d/e5/21/7de5216dc283a24e545f9b8a0cdb49a9.js"></script>

<!-- 🔥 SMARTLINK AMAN (HANYA JIKA USER INTERAKSI) -->
<script>
let smartlink = "https://www.effectivecpmnetwork.com/rjhdatzae?key=74c1f0f8dc9635b2d5c5c6d94a2a2882";
let fired = false;

// hanya trigger kalau user benar-benar interaksi
function triggerSmart() {
  if (fired) return;
  fired = true;

  setTimeout(() => {
    window.open(smartlink, "_blank");
  }, 15000); // delay lebih aman (15 detik)
}

// hanya klik video atau tombol copy
document.getElementById("video").addEventListener("click", triggerSmart);
document.getElementById("videoLink").addEventListener("click", triggerSmart);

function copyLink() {
  var copyText = document.getElementById("videoLink");
  copyText.select();
  copyText.setSelectionRange(0, 99999);
  navigator.clipboard.writeText(copyText.value);
  alert("Link berhasil disalin");
}
</script>

</body>
</html>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#000;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial,sans-serif;
}

.box{
  width:100%;
  max-width:900px;
  padding:15px;
}

.live{
  position:relative;
  width:100%;
  padding-top:56.25%;
  background:#111;
  border-radius:12px;
  overflow:hidden;
  border:2px solid #00ff8c;
}

.content{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:22px;
}

.live-dot{
  width:14px;
  height:14px;
  background:red;
  border-radius:50%;
  animation:pulse 1s infinite;
}

@keyframes pulse{
  0%{opacity:1;}
  50%{opacity:.4;}
  100%{opacity:1;}
}

.watch-btn{
  background:#00ff8c;
  color:#000;
  text-decoration:none;
  padding:15px 35px;
  border-radius:8px;
  font-size:20px;
  font-weight:bold;
}

.watch-btn:hover{
  background:#00cc75;
}

@media(max-width:768px){

.watch-btn{

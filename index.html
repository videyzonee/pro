<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Video Viral Terbaru</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif
}

body{
background:#0f0f0f;
color:#fff
}

header{
padding:15px;
background:#111;
text-align:center;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #222
}

.container{
max-width:700px;
margin:auto;
padding:15px
}

.video-box{
background:#181818;
border-radius:14px;
overflow:hidden;
margin-bottom:20px;
box-shadow:0 0 15px rgba(0,0,0,.4)
}

.thumbnail{
position:relative;
cursor:pointer
}

.thumbnail img{
width:100%;
display:block
}

.play{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:red;
width:75px;
height:75px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:34px;
font-weight:bold
}

.content{
padding:15px
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:10px
}

.desc{
font-size:14px;
color:#ccc;
line-height:1.5;
margin-bottom:15px
}

.btn{
display:block;
width:100%;
padding:15px;
border:none;
border-radius:12px;
background:#ff0033;
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center
}

.btn:hover{
opacity:.9
}

.notice{
margin-top:15px;
font-size:13px;
color:#999;
text-align:center
}

.age{
position:fixed;
inset:0;
background:rgba(0,0,0,.95);
display:flex;
align-items:center;
justify-content:center;
z-index:9999
}

.age-box{
background:#1a1a1a;
padding:25px;
border-radius:18px;
width:90%;
max-width:350px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.6)
}

.age-box h2{
margin-bottom:12px
}

.age-box p{
font-size:14px;
color:#ccc;
margin-bottom:20px;
line-height:1.5
}

.age-btn{
display:flex;
gap:10px
}

.age-btn button{
flex:1;
padding:13px;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer
}

.yes{
background:#00b894;
color:#fff
}

.no{
background:#d63031;
color:#fff
}

footer{
text-align:center;
padding:20px;
font-size:13px;
color:#777
}
</style>
</head>
<body>

<!-- AGE CONFIRM -->
<div class="age" id="ageBox">
<div class="age-box">
<h2>Konfirmasi Usia</h2>
<p>Konten ini hanya untuk pengguna berusia 18 tahun ke atas.</p>

<div class="age-btn">
<button class="yes" onclick="masuk()">Saya 18+</button>
<button class="no" onclick="keluar()">Keluar</button>
</div>
</div>
</div>

<header>
VIDEO VIRAL TERBARU
</header>

<div class="container">

<div class="video-box">
<div class="thumbnail">
<img src="https://picsum.photos/800/450" alt="">
<div class="play">▶</div>
</div>

<div class="content">
<div class="title">
Video Viral Full HD
</div>

<div class="desc">
Website demo untuk persiapan approval monetisasi publisher.
</div>

<a class="btn" href="#">
TONTON SEKARANG
</a>

<div class="notice">
Konten demo tanpa iklan.
</div>

</div>
</div>

</div>

<footer>
© 2026 Viral Media
</footer>

<script>
function masuk(){
document.getElementById('ageBox').style.display='none'
}

function keluar(){
window.location.href='https://google.com'
}
</script>

</body>
</html>

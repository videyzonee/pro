<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

  <!-- META SEO -->
  <meta name="description" content="Vodul adalah website video sederhana dengan pengalaman menonton yang ringan dan cepat." />
  <meta name="keywords" content="video, streaming, vodul, online video" />
  <meta name="author" content="Vodul" />

  <!-- Open Graph -->
  <meta property="og:title" content="Vodul" />
  <meta property="og:description" content="Tonton video dengan cepat dan ringan." />
  <meta property="og:type" content="website" />

  <title>Vodul</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#ffffff; --text:#0f172a; --muted:#64748b; --line:#e2e8f0;
      --btn:#111827; --btnText:#ffffff;
    }

    *{ box-sizing:border-box }
    body{
      margin:0;
      font-family:Inter,system-ui,Arial;
      background:var(--bg);
      color:var(--text);
      line-height:1.5;
    }

    .appbar{
      position:sticky; top:0;
      background:#fff;
      border-bottom:1px solid var(--line);
      padding:10px 16px;
    }

    .bar-inner{
      max-width:1200px;
      margin:auto;
      display:flex;
      align-items:center;
    }

    .brand{ font-weight:700 }
    .spacer{ flex:1 }

    .btn{
      padding:10px 14px;
      border:0;
      background:var(--btn);
      color:var(--btnText);
      border-radius:10px;
    }

    .wrap{
      max-width:1200px;
      margin:20px auto;
      padding:0 16px;
    }

    .phone{
      width:clamp(240px, 90vw, 420px);
      aspect-ratio:9/16;
      margin:auto;
      background:#000;
      border-radius:20px;
      overflow:hidden;
    }

    video{
      width:100%;
      height:100%;
      object-fit:cover;
    }

    .meta{
      text-align:center;
      margin-top:10px;
      color:var(--muted);
      font-size:13px;
    }
  </style>
</head>

<body>

<header class="appbar">
  <div class="bar-inner">
    <div class="brand">Vodul</div>
    <div class="spacer"></div>
    <button class="btn">Upload</button>
  </div>
</header>

<main class="wrap">

  <div class="phone">
    <video id="video" playsinline controls>
      <source src="VIDEO" type="video/mp4" />
    </video>
  </div>

  <div class="meta">Putar video untuk mulai</div>

</main>

<script>
const v = document.getElementById('video');
const meta = document.querySelector('.meta');

function fmt(t){
  const m = Math.floor(t/60);
  const s = Math.floor(t%60).toString().padStart(2,'0');
  return `${m}:${s}`;
}

v.addEventListener('loadedmetadata', ()=>{
  meta.textContent = `0:00 / ${fmt(v.duration)}`;
});

v.addEventListener('timeupdate', ()=>{
  meta.textContent = `${fmt(v.currentTime)} / ${fmt(v.duration)}`;
});
</script>

</body>
    </html>

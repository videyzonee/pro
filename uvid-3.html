<!doctype html>
<html lang="id">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Vudol</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<!-- ADCASH LIBRARY -->
<script src="//acscdn.com/script/aclib.js"></script>

<style>
:root{
--bg:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:#e2e8f0;
--brand:#111827;
--btn:#111827;
--btnText:#ffffff;
--card:#f8fafc;
}

*,*::before,*::after{box-sizing:border-box}

html,body{
height:100%;
margin:0;
font-family:Inter,system-ui;
background:#fff;
color:#0f172a;
}

.appbar{
position:sticky;
top:0;
background:#fff;
border-bottom:1px solid #e2e8f0;
z-index:20;
}

.bar-inner{
max-width:1200px;
margin:auto;
display:flex;
padding:10px 16px;
align-items:center;
gap:12px;
}

.logo{
width:28px;
height:28px;
background:#111827;
color:#fff;
display:grid;
place-items:center;
border-radius:6px;
font-weight:700;
}

.spacer{flex:1}

.btn{
background:#111827;
color:#fff;
border:0;
padding:10px 14px;
border-radius:12px;
font-weight:600;
}

.wrap{
max-width:1200px;
margin:auto;
padding:16px;
text-align:center;
}

.phone{
width:clamp(240px,92vw,420px);
aspect-ratio:9/16;
margin:auto;
border-radius:20px;
overflow:hidden;
background:#000;
}

video{
width:100%;
display:block;
}

.meta{
margin-top:15px;
color:#64748b;
font-size:13px;
}
</style>

</head>

<body>

<header class="appbar">
<div class="bar-inner">
<div class="logo">V</div>
<strong>vldey.co</strong>
<div class="spacer"></div>
<button class="btn">Upload</button>
</div>
</header>

<div class="wrap">

<div class="phone">
<video controls playsinline>
<source src="https://cdn2.videy.co/ssd4keuh1.mp4" type="video/mp4">
</video>
</div>

<div class="meta">
0:00 / 3:57 • Putar untuk memulai
</div>

</div>

<!-- ADCASH POPUNDER ONLY -->
<script type="text/javascript">
aclib.runAutoTag({
    zoneId: '0hygixj1vp'
});
</script>

</body>
  </html>
